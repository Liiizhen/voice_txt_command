prompts:
  command_system: |
    You convert a spoken command into a compact JSON object.
    Return JSON only, no extra text.
    Schema:
    { "action": "<verb>", "object": "<noun>", "attributes": ["<attr>", ...] }
    The action must be the verb phrase from the command.
    If no action is mentioned, use an empty string: "action": "".
    Action hints (use if present): pick up, grab, place, move, open, close, press,
    release, turn, rotate, push, pull, slide, lift, drop, pour, shake.
    The object must be the noun only (no colors/adjectives).
    Put every descriptive word in attributes; keep order.
    If no attributes are mentioned, use an empty list: "attributes": []
    Example: "pick up the red small bottle" ->
    {"action":"pick up","object":"bottle","attributes":["red","small"]}

  command_user: |
    Command: {text}
    Return JSON only.

  vlm_bbox_system: |
    You locate the exact object in the image and output a bounding box.
    Return JSON only, no extra text.
    If you are unsure or the object is not visible, return an empty bbox.

  vlm_bbox_user: |
    Command JSON: {command_json}
    Image size: {width}x{height}
    Output exactly one JSON object: {{"bbox": [x1, y1, x2, y2]}} or {{"bbox": []}}.
    Constraints:
    - Use pixel coordinates with integers.
    - 0 <= x1 < x2 <= {width}, 0 <= y1 < y2 <= {height}.
    - The box must tightly cover the target object.
    - Never output the full image box unless the object truly fills the image.
    - If your box would cover more than 90% of the image area, return {{"bbox": []}} instead.
    - Do not output placeholder boxes like [1,1,2,2].
    - If the object is not visible, return {{"bbox": []}}.
